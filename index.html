<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI TRADING FIX CORS SYSTEM</title>

<style>
body{
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{ color:#00e5ff; }

table{
    width:98%;
    margin:auto;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#131b2e;
    color:#00e5ff;
}

td,th{
    border:1px solid #1f2b45;
    padding:8px;
    font-size:12px;
}

.buy{ color:#00ff88; font-weight:bold; }
.sell{ color:#ff4d4d; font-weight:bold; }
.no{ color:#888; }
.price{ color:#ffd54f; }
.small{ font-size:11px; color:#aaa; }
</style>
</head>

<body>

<h1>🚀 AI TRADING FIX (CORS SAFE)</h1>

<table>
<tr>
<th>PAIR</th>
<th>PRICE</th>
<th>SIGNAL</th>
<th>STRENGTH</th>
<th>PROB 250</th>
<th>TARGET 250</th>
<th>STATUS</th>
</tr>

<tbody id="data"></tbody>
</table>

<div id="update"></div>

<script>

const proxy = "https://api.allorigins.win/raw?url=";

const symbols = [
"BTCUSDT","ETHUSDT","BNBUSDT",
"SOLUSDT","XRPUSDT","DOGEUSDT"
];

function EMA(data,p){
let k=2/(p+1);
let e=[data[0]];
for(let i=1;i<data.length;i++){
e.push(data[i]*k + e[i-1]*(1-k));
}
return e;
}

// ================= FETCH DATA (FIX CORS)
async function getMarket(symbol){
const url = encodeURIComponent(
`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=15m&limit=200`
);

const res = await fetch(proxy + url);
const d = await res.json();

return {
c: d.map(x => +x[4]),
v: d.map(x => +x[5])
};
}

async function price(symbol){
const url = encodeURIComponent(
`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`
);

const res = await fetch(proxy + url);
const d = await res.json();
return +d.price;
}

// ================= ANALYZE ENGINE
function analyze(c,v){

const ema9=EMA(c,9);
const ema21=EMA(c,21);
const ema50=EMA(c,50);
const ema200=EMA(c,200);

const current=c.at(-1);

// TREND SCORE
let bull=0,bear=0;

if(ema9.at(-1)>ema21.at(-1)) bull+=20; else bear+=20;
if(ema21.at(-1)>ema50.at(-1)) bull+=20; else bear+=20;
if(ema50.at(-1)>ema200.at(-1)) bull+=30; else bear+=30;

if(current>ema200.at(-1)) bull+=20;
else bear+=20;

const momentum=current-c.at(-5);
if(momentum>0) bull+=10; else bear+=10;

const bullPct=(bull/(bull+bear))*100;

// ATR
let changes=[];
for(let i=1;i<c.length;i++){
changes.push(Math.abs(c[i]-c[i-1]));
}

const atr = changes.slice(-20).reduce((a,b)=>a+b,0)/20;

// SIGNAL
let signal="NO TRADE";
if(bullPct>60) signal="BUY";
if(bullPct<40) signal="SELL";

// TARGET 250 PIP (simple scaling)
const tp250_up=current+atr*5;
const tp250_dn=current-atr*5;

// PROBABILITY
let prob250 = Math.min(95, bullPct + (atr/current)*1000);

if(bullPct<45 && bullPct>55) prob250 *= 0.5;

// STATUS FILTER
let status="OK";
if(prob250 < 40){
status="WEAK SETUP";
signal="NO TRADE";
}

return {
signal,
bullPct,
prob250,
tp250_up,
tp250_dn,
status
};
}

// ================= RENDER
async function render(){

let html="";

for(let s of symbols){

try{

const m=await getMarket(s);
const p=await price(s);
const r=analyze(m.c,m.v);

let cls="no";
if(r.signal==="BUY") cls="buy";
if(r.signal==="SELL") cls="sell";

let target="-";

if(r.signal==="BUY"){
target=`UP 250: ${r.tp250_up.toFixed(2)}`;
}else if(r.signal==="SELL"){
target=`DN 250: ${r.tp250_dn.toFixed(2)}`;
}

html+=`
<tr>
<td>${s}</td>
<td class="price">${p.toFixed(4)}</td>
<td class="${cls}">${r.signal}</td>
<td>${r.bullPct.toFixed(1)}%</td>
<td>${r.prob250.toFixed(1)}%</td>
<td class="small">${target}</td>
<td class="small">${r.status}</td>
</tr>
`;

}catch(e){
console.log("error:",s,e);
}

}

document.getElementById("data").innerHTML=html;
document.getElementById("update").innerHTML=
"Last Update: "+new Date().toLocaleString();
}

render();
setInterval(render,15000);

</script>

</body>
</html>
