<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI MONITOR RR 1:2 FIXED (220/110)</title>

<style>
body{
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{ color:#00e5ff; }

table{
    width:98%;
    margin:auto;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#131b2e;
    color:#00e5ff;
}

td,th{
    border:1px solid #1f2b45;
    padding:8px;
    font-size:12px;
}

.buy{ color:#00ff88; font-weight:bold; }
.sell{ color:#ff4d4d; font-weight:bold; }
.no{ color:#888; }
.price{ color:#ffd54f; }
.small{ font-size:11px; color:#aaa; }
</style>
</head>

<body>

<h1>📊 AI MONITOR RR 1:2 FIXED (TP 220 / SL 110)</h1>

<table>
<tr>
<th>PAIR</th>
<th>PRICE</th>
<th>SIGNAL</th>
<th>RSI</th>
<th>STRENGTH</th>
<th>ENTRY</th>
<th>TP</th>
<th>SL</th>
<th>STATUS</th>
<th>RESULT</th>
</tr>

<tbody id="data"></tbody>
</table>

<div id="update"></div>

<script>

const symbols=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT"];

let positions = {};

// ================= EMA
function EMA(data,p){
let k=2/(p+1);
let e=[data[0]];
for(let i=1;i<data.length;i++){
e.push(data[i]*k + e[i-1]*(1-k));
}
return e;
}

// ================= RSI
function RSI(data, period=14){
let gains=0,losses=0;

for(let i=data.length-period;i<data.length;i++){
let diff=data[i]-data[i-1];
if(diff>=0) gains+=diff;
else losses-=diff;
}

let rs=gains/(losses||1);
return 100-(100/(1+rs));
}

// ================= DATA
async function getMarket(symbol){
const url=`https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=30m&limit=200`;
const res=await fetch(url);
const d=await res.json();
return d.map(x=>+x[4]);
}

async function price(symbol){
const url=`https://data-api.binance.vision/api/v3/ticker/price?symbol=${symbol}`;
const res=await fetch(url);
const d=await res.json();
return +d.price;
}

// ================= ANALYZE
function analyze(c){

const current=c.at(-1);

const ema9=EMA(c,9);
const ema21=EMA(c,21);
const ema50=EMA(c,50);
const ema200=EMA(c,200);

const rsi=RSI(c,14);

// trend strength
let bull=0,bear=0;

if(ema9.at(-1)>ema21.at(-1)) bull+=20; else bear+=20;
if(ema21.at(-1)>ema50.at(-1)) bull+=20; else bear+=20;
if(ema50.at(-1)>ema200.at(-1)) bull+=30; else bear+=30;

if(current>ema200.at(-1)) bull+=20;
else bear+=20;

const momentum=current-c.at(-5);
if(momentum>0) bull+=10; else bear+=10;

const bullPct=(bull/(bull+bear))*100;

// FILTER KETAT (anti sideways)
let isTrend = Math.abs(bullPct-50)>18;

// SIGNAL
let signal="NO TRADE";

if(isTrend && bullPct>68 && rsi<70){
signal="BUY";
}
else if(isTrend && bullPct<32 && rsi>30){
signal="SELL";
}

return {
signal,
bullPct,
rsi,
current
};
}

// ================= LOOP
async function render(){

let html="";

for(let s of symbols){

const c=await getMarket(s);
const p=await price(s);
const r=analyze(c);

let entry="-";
let tp="-";
let sl="-";
let status="WAIT";
let result="-";

// ================= FIXED RR 1:2
const TP_PIPS = 220;
const SL_PIPS = 110;

// ================= ENTRY LOCK
if(!positions[s]){

if(r.signal==="BUY"){

positions[s]={
type:"BUY",
entry:r.current,
tp:r.current + TP_PIPS,
sl:r.current - SL_PIPS
};

}

if(r.signal==="SELL"){

positions[s]={
type:"SELL",
entry:r.current,
tp:r.current - TP_PIPS,
sl:r.current + SL_PIPS
};

}
}

// ================= TRACK POSITION
if(positions[s]){

let pos=positions[s];

entry=pos.entry.toFixed(2);
tp=pos.tp.toFixed(2);
sl=pos.sl.toFixed(2);
status=pos.type;

// BUY LOGIC
if(pos.type==="BUY"){

if(p>=pos.tp){
result="TP ✅";
delete positions[s];
}
else if(p<=pos.sl){
result="SL ❌";
delete positions[s];
}
else result="HOLD BUY";

}

// SELL LOGIC
if(pos.type==="SELL"){

if(p<=pos.tp){
result="TP ✅";
delete positions[s];
}
else if(p>=pos.sl){
result="SL ❌";
delete positions[s];
}
else result="HOLD SELL";

}

}

let cls="no";
if(r.signal==="BUY") cls="buy";
if(r.signal==="SELL") cls="sell";

html+=`
<tr>
<td>${s}</td>
<td class="price">${p.toFixed(4)}</td>
<td class="${cls}">${r.signal}</td>
<td>${r.rsi.toFixed(1)}</td>
<td>${r.bullPct.toFixed(1)}%</td>
<td>${entry}</td>
<td>${tp}</td>
<td>${sl}</td>
<td class="small">${status}</td>
<td class="small">${result}</td>
</tr>
`;
}

document.getElementById("data").innerHTML=html;
document.getElementById("update").innerHTML=
"Last Update: "+new Date().toLocaleString();
}

render();
setInterval(render,15000);

</script>

</body>
</html>
