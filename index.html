<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEAN EDGE MONITOR v1 (WINNING SYSTEM)</title>

<style>
body{
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{ color:#00e5ff; }

table{
    width:98%;
    margin:auto;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#131b2e;
    color:#00e5ff;
}

td,th{
    border:1px solid #1f2b45;
    padding:8px;
    font-size:12px;
}

.buy{ color:#00ff88; font-weight:bold; }
.sell{ color:#ff4d4d; font-weight:bold; }
.no{ color:#888; }
.price{ color:#ffd54f; }
.small{ font-size:11px; color:#aaa; }
</style>
</head>

<body>

<h1>📊 CLEAN EDGE MONITOR v1 (EMA + VOLUME + ATR)</h1>

<table>
<tr>
<th>PAIR</th>
<th>PRICE</th>
<th>SIGNAL</th>
<th>TREND</th>
<th>ENTRY</th>
<th>TP</th>
<th>SL</th>
<th>STATUS</th>
<th>RESULT</th>
</tr>

<tbody id="data"></tbody>
</table>

<div id="update"></div>

<script>

const symbols=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT"];

let positions = {};

// ================= EMA
function EMA(data,p){
let k=2/(p+1);
let e=[data[0]];
for(let i=1;i<data.length;i++){
e.push(data[i]*k + e[i-1]*(1-k));
}
return e;
}

// ================= VOLUME AVG
function VOL_AVG(v,i){
let sum=0;
for(let k=i-20;k<i;k++){
sum += v[k];
}
return sum/20;
}

// ================= ATR SIMPLE
function ATR(c,i){
let sum=0;
for(let k=i-14;k<i;k++){
sum += Math.abs(c[k]-c[k-1]);
}
return sum/14;
}

// ================= CORE SIGNAL (SAMA DENGAN BACKTEST WINNING)
function signal(c,v,i){

let ema50 = EMA(c.slice(0,i+1),50).at(-1);
let ema200 = EMA(c.slice(0,i+1),200).at(-1);

let atr = ATR(c,i);
if(atr < 40) return null; // filter market mati

let volNow = v[i];
let volAvg = VOL_AVG(v,i);

// TREND
let up = ema50 > ema200;
let down = ema50 < ema200;

// VOLUME CONFIRM
if(up && volNow > volAvg) return "BUY";
if(down && volNow > volAvg) return "SELL";

return null;
}

// ================= PRICE
async function price(symbol){
const url=`https://data-api.binance.vision/api/v3/ticker/price?symbol=${symbol}`;
const res=await fetch(url);
const d=await res.json();
return +d.price;
}

// ================= MARKET DATA
async function getMarket(symbol){
const url=`https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=15m&limit=200`;
const res=await fetch(url);
const d=await res.json();
return {
c:d.map(x=>+x[4]),
v:d.map(x=>+x[5])
};
}

// ================= LOOP
async function render(){

let html="";

for(let s of symbols){

const m=await getMarket(s);
const p=await price(s);

const c=m.c;
const v=m.v;

const sig = signal(c,v,c.length-1);

let entry="-";
let tp="-";
let sl="-";
let status="WAIT";
let result="-";

// FIXED RR (SAMA SEPERTI STRATEGY BACKTEST)
const TP = 220;
const SL = 110;

// ENTRY
if(!positions[s]){

if(sig==="BUY"){
positions[s]={
type:"BUY",
entry:p,
tp:p + TP,
sl:p - SL
};
}

if(sig==="SELL"){
positions[s]={
type:"SELL",
entry:p,
tp:p - TP,
sl:p + SL
};
}
}

// TRACK
if(positions[s]){

let pos=positions[s];

entry=pos.entry.toFixed(2);
tp=pos.tp.toFixed(2);
sl=pos.sl.toFixed(2);
status=pos.type;

// BUY
if(pos.type==="BUY"){

if(p>=pos.tp){
result="TP ✅";
delete positions[s];
}
else if(p<=pos.sl){
result="SL ❌";
delete positions[s];
}
else result="HOLD BUY";

}

// SELL
if(pos.type==="SELL"){

if(p<=pos.tp){
result="TP ✅";
delete positions[s];
}
else if(p>=pos.sl){
result="SL ❌";
delete positions[s];
}
else result="HOLD SELL";

}

}

let cls="no";
if(sig==="BUY") cls="buy";
if(sig==="SELL") cls="sell";

html+=`
<tr>
<td>${s}</td>
<td class="price">${p.toFixed(4)}</td>
<td class="${cls}">${sig||"NO TRADE"}</td>
<td>${p>EMA ? "UP" : "DOWN"}</td>
<td>${entry}</td>
<td>${tp}</td>
<td>${sl}</td>
<td class="small">${status}</td>
<td class="small">${result}</td>
</tr>
`;
}

document.getElementById("data").innerHTML=html;
document.getElementById("update").innerHTML=
"Last Update: "+new Date().toLocaleString();
}

render();
setInterval(render,15000);

</script>

</body>
</html>
